services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jahon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jahon_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jahon_xabarlari}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

  telegram-bot:
    build: ./telegram-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend

volumes:
  postgres_data:
